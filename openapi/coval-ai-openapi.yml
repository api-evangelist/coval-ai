    patch:
      operationId: updatePersona
      summary: Update persona
      tags: [Personas]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated persona.
    delete:
      operationId: deletePersona
      summary: Delete persona
      tags: [Personas]
      responses:
        '204':
