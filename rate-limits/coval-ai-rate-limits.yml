specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Coval
providerId: coval-ai
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- AI
- Agents
- Voice AI
- Simulation
- Evaluation
- Testing
- Rate Limiting
- Quotas
- Throttling
description: >-
  The Coval REST API is authenticated with an organization-scoped API key
  passed in the X-API-Key header, and list endpoints are cursor-paginated.
  Coval does not publish specific numeric request rate limits or per-plan
  simulation/evaluation quotas in its public documentation; concurrency and
  volume allotments are governed by the account agreement. Values below are
  unreconciled and should be confirmed with the provider.
notes: >-
  No public rate-limit table was found. Confirm request-per-minute ceilings,
  simulation concurrency, and monthly evaluation volume with Coval during
  onboarding. Standard HTTP 429 throttling and exponential-backoff client
  behavior should be assumed until documented otherwise.
sources:
- https://docs.coval.dev/api-reference/introduction
- https://docs.coval.dev/guides/API-Keys
responseCodes:
  throttled: 429
limits:
- name: API Requests
  scope: organization
  metric: requests
  limit: see provider documentation
  notes: Organization-scoped via the X-API-Key header; numeric ceiling not publicly documented.
- name: Simulation Concurrency
  scope: organization
  metric: simulations
  limit: see provider agreement
  notes: Concurrent in-flight simulations per run are governed by the account plan.
- name: Evaluation Volume
  scope: organization
  metric: evaluations
  limit: see provider agreement
  notes: Monthly simulation / evaluation volume is set by the account agreement.
policies:
- name: Tiered Limits
  description: Concurrency and volume scale with the account plan and Enterprise agreements.
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor Retry-After on HTTP 429.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
