meters:
- name: simulations_run
  description: Number of agent simulations launched across runs. A likely primary cost driver; rate not publicly documented.
  unit: simulations
  aggregation: sum
  dimensions:
  - organization
  - agent
  - run
- name: conversations_evaluated
  description: Production conversations / transcripts submitted for evaluation and observability.
  unit: conversations
  aggregation: sum
  dimensions:
  - organization
  - agent
- name: metric_evaluations
  description: Metric (scorer) evaluations executed against simulations and conversations.
  unit: evaluations
  aggregation: sum
  dimensions:
  - organization
  - metric
principles:
- name: Visibility
  description: Track simulations run and conversations evaluated per agent and team via the runs, simulations, and conversations APIs.
- name: Allocation
  description: Tag agents, test sets, and runs to map evaluation spend to internal teams and workloads.
- name: Optimization
  description: Right-size test sets and persona coverage; reuse run templates and schedule runs to avoid redundant simulation volume.
- name: Accountability
  description: Assign owners per agent / project and review evaluation volume against the negotiated contract.
