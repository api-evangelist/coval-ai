description: >-
  FinOps view of Coval spend. Coval is a sales-led simulation and evaluation
  platform for AI voice and chat agents, so spend is governed by a negotiated
  contract rather than a public usage meter. The natural cost drivers are the
  number of simulations run, the volume of conversations and transcripts
  evaluated, and the number of metric evaluations executed. Concrete unit
  rates are not publicly documented and must be reconciled with Coval.
notes: >-
  Pricing is not published; meters below describe likely cost drivers for
  allocation and forecasting and are unreconciled. Confirm billable units
  (per simulation, per evaluation, per seat, or flat platform fee) with Coval.
sources:
- https://www.coval.dev
