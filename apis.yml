aid: coval-ai
url: https://raw.githubusercontent.com/api-evangelist/coval-ai/refs/heads/main/apis.yml
name: Coval
kind: company
description: Coval is a simulation and evaluation platform for AI voice and chat
  agents. Inspired by autonomous-vehicle testing, it simulates end customers across
  realistic scenarios, personas, accents, and background noise, then scores agent
  behavior with built-in and custom metrics. The REST API manages agents, test sets
  and test cases, personas, metrics, simulation runs, and production conversations.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- AI
- Agents
- Voice AI
- Simulation
- Evaluation
- Testing
